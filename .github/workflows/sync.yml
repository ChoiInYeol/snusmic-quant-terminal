name: Sync SNUSMIC reports

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      pages:
        description: "SNUSMIC research pages to sync"
        required: false
        default: "1-7"
      enable_hybrid_ocr:
        description: "Start OpenDataLoader hybrid OCR backend"
        required: false
        default: "false"
      force_full:
        description: "Run even when no new report is detected"
        required: false
        default: "false"
  schedule:
    - cron: "30 23 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: snusmic-data-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_sync: ${{ steps.decide.outputs.should_sync }}
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect new page-one reports
        id: detect
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          PYTHONPATH=src python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          from snusmic_pipeline.change_detection import new_report_urls
          urls = new_report_urls(Path("data/manifest.json"))
          print(f"has_new={'true' if urls else 'false'}")
          print("new_urls<<EOF")
          for url in urls:
              print(url)
          print("EOF")
          PY

      - name: Decide work
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.inputs.force_full || 'false' }}" = "true" ]; then
            echo "should_sync=true" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.detect.outputs.has_new }}" = "true" ]; then
            echo "should_sync=true" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "No new reports; deploying committed data only."
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new reports on page one; skipping heavy sync."
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  sync:
    needs: check
    if: needs.check.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      PAGES: ${{ github.event.inputs.pages || '1-7' }}
      ENABLE_HYBRID_OCR: ${{ github.event.inputs.enable_hybrid_ocr || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies
        run: uv sync --group dev --extra ocr

      - name: Run tests
        run: uv run pytest

      - name: Start OpenDataLoader hybrid OCR backend
        if: env.ENABLE_HYBRID_OCR == 'true'
        run: |
          uv run opendataloader-pdf-hybrid --port 5002 --force-ocr --ocr-lang "ko,en" --device cpu > /tmp/opendataloader-hybrid.log 2>&1 &
          for i in {1..60}; do
            python -c 'import socket; s=socket.socket(); s.settimeout(1); s.connect(("127.0.0.1", 5002)); s.close()' && exit 0 || true
            sleep 2
          done
          echo "OpenDataLoader hybrid backend did not open port 5002"
          cat /tmp/opendataloader-hybrid.log
          exit 1

      - name: Sync reports and Google Sheet
        run: |
          if [ "$ENABLE_HYBRID_OCR" = "true" ]; then
            uv run python -m snusmic_pipeline sync --pages "$PAGES" --opendataloader-hybrid docling-fast
          else
            uv run python -m snusmic_pipeline sync --pages "$PAGES"
          fi

      - name: Build GitHub Pages site
        run: |
          uv run python -m snusmic_pipeline build-site
          uv run python -m snusmic_pipeline build-warehouse
          uv run python -m snusmic_pipeline refresh-prices
          uv run python -m snusmic_pipeline run-backtest
          python scripts/prepare_quarto_site.py
          quarto render site/quarto

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/manifest.json data/extracted_reports.csv data/price_metrics.json data/portfolio_backtests.json data/pdfs data/markdown data/warehouse data/quant_v3
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Refresh SNUSMIC report data"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/quarto/_site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy:
    needs: check
    if: needs.check.outputs.should_sync != 'true' && needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build Quarto site from committed data
        run: |
          PYTHONPATH=src python -c 'from pathlib import Path; from snusmic_pipeline.site_builder import build_site; build_site(Path("data"), Path("site/public"))'
          python scripts/prepare_quarto_site.py
          quarto render site/quarto

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/quarto/_site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
