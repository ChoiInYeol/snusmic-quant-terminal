name: Publish GitHub Pages mirror

# Phase 4 — chain after sync.yml instead of relying on paths-filter on push.
# A push to main with no data update used to skip the deploy because the
# paths filter rejected the diff; conversely a sync.yml run that wrote new
# warehouse rows would NOT trigger pages because it ran on schedule, not on
# push. ``workflow_run`` waits for sync.yml to succeed and only then rebuilds
# the mirror against the freshly-pushed data.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Sync SNUSMIC reports"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: snusmic-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip when the upstream sync.yml run failed (workflow_run fires on every
    # completed conclusion — success, failure, cancelled). We only want to
    # publish artifacts derived from a green data run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build dashboard artifact
        run: |
          PYTHONPATH=src python -c 'from pathlib import Path; from snusmic_pipeline.site_builder import build_site; build_site(Path("data"), Path("site/public"))'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build Next.js static mirror
        run: |
          npm run prepare-data
          GITHUB_PAGES=true NEXT_PUBLIC_BASE_PATH=/snusmic-quant-terminal npm run build
        working-directory: apps/web

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
