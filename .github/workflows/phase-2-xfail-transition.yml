name: phase-2-xfail-transition
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --group dev
      - name: Enforce no xfail markers remain on lookahead property test
        # Phase 2a flipped every site in tests/test_lookahead_property.py from
        # xfail → pass. Any re-introduced xfail marker means either (a) a Phase
        # 2a site regressed, or (b) the test was muted; both fail the build.
        run: |
          set -euo pipefail
          output="$(uv run pytest --collect-only -q tests/test_lookahead_property.py)"
          echo "$output"
          if echo "$output" | grep -qi 'xfail'; then
            echo '::error::xfail marker detected on tests/test_lookahead_property.py — Phase 2 lookahead fix regressed.'
            exit 1
          fi
          if ! echo "$output" | grep -q 'test_decisions_use_prior_close_not_same_day'; then
            echo '::error::tests/test_lookahead_property.py does not contain the Phase-2a regression test.'
            exit 1
          fi
