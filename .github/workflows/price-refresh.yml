name: Refresh market data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies
        run: uv sync --group dev

      - name: Refresh yfinance metrics
        run: |
          uv run python -m snusmic_pipeline refresh-market --no-build-site
          uv run python -m snusmic_pipeline build-warehouse
          uv run python -m snusmic_pipeline refresh-prices
          uv run python -m snusmic_pipeline run-backtest

      - name: Build Quarto site
        run: |
          uv run python -m snusmic_pipeline build-site
          python scripts/prepare_quarto_site.py
          quarto render site/quarto

      - name: Commit market data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/price_metrics.json data/portfolio_backtests.json data/warehouse data/quant_v3
          if git diff --cached --quiet; then
            echo "No market data changes to commit"
          else
            git commit -m "Refresh market data"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/quarto/_site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
