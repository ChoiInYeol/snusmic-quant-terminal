name: atomic-rehoming
# Phase 4 plan AC #2 — when Phase 4's "atomic re-homing" PR lands it must
# squash-merge a single commit that contains all three markers:
#   (a) vercel.json drops its inline Python build step,
#   (b) the legacy site/public tree is removed,
#   (c) build_site writes directly to apps/web/public/data/.
# Splitting any of the three into a separate commit breaks the migration
# atomicity that the plan promised. This workflow runs on every PR diff
# and on every push to main; it ONLY enforces the gate when at least one
# of the three markers is touched (so Phase 1a..3 PRs are not affected).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute diff range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
            echo "head=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Atomic re-homing three-marker check
        env:
          BASE: ${{ steps.range.outputs.base }}
          HEAD: ${{ steps.range.outputs.head }}
        run: |
          set -euo pipefail
          DIFF="$(git diff --unified=0 "$BASE" "$HEAD")"
          # Detect "Phase 4 in flight" — at least one of the three markers
          # is being modified in this diff. If none, the gate is a no-op.
          touches_vercel=$(echo "$DIFF" | grep -cE 'diff --git a/vercel\.json' || true)
          touches_site_public=$(echo "$DIFF" | grep -cE 'diff --git a/site/public' || true)
          touches_build_site=$(echo "$DIFF" | grep -cE 'apps/web/public/data' || true)
          if [ "$touches_vercel" = 0 ] && [ "$touches_site_public" = 0 ] && [ "$touches_build_site" = 0 ]; then
            echo "atomic-rehoming: no Phase-4 markers touched; gate is a no-op for this diff."
            exit 0
          fi

          missing=()
          if ! echo "$DIFF" | grep -qE '^-.*"build".*python'; then
            missing+=("vercel.json: must remove the inline Python build step")
          fi
          if ! echo "$DIFF" | grep -qE '^diff --git a/site/public/'; then
            missing+=("site/public: must include the deletion of the legacy tree")
          fi
          if ! echo "$DIFF" | grep -qE 'apps/web/public/data'; then
            missing+=("apps/web/public/data: build_site / prepare-data must point to the new path")
          fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Phase-4 atomic-rehoming gate failed — missing markers:"
            for m in "${missing[@]}"; do echo "  - $m"; done
            echo "Phase 4 must squash-merge all three changes in a single commit."
            exit 1
          fi
          echo "atomic-rehoming: all three markers present in the diff."
