name: keepalive
# Phase 4 pre-mortem Scenario 4 mitigation — GitHub auto-disables scheduled
# workflows after 60 days of repository inactivity. This workflow runs every
# Monday and pushes a single-line touch to .omc/state/last-keepalive.txt
# with [skip ci] so the scheduled chain (sync.yml → pages.yml) keeps
# reporting recent activity.
#
# The follow-up "git-log pollution" trade-off is logged in
# .omc/plans/open-questions.md (alternatives: separate state repo,
# monthly reminder issue, external repository_dispatch from cron-job.org).

on:
  schedule:
    - cron: "17 9 * * 1" # every Monday at 09:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snusmic-keepalive-${{ github.ref }}
  cancel-in-progress: false

jobs:
  touch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Touch keepalive marker
        run: |
          mkdir -p .omc/state
          echo "$(date -u --iso-8601=seconds)" > .omc/state/last-keepalive.txt

      - name: Commit + push
        run: |
          set -euo pipefail
          git config user.name "snusmic-keepalive-bot"
          git config user.email "noreply@github.com"
          git add .omc/state/last-keepalive.txt
          if git diff --cached --quiet; then
            echo "keepalive: no diff to commit (already up to date)."
            exit 0
          fi
          git commit -m "chore: keepalive [skip ci]"
          # Mild rebase loop in case sync.yml or another workflow pushes
          # concurrently. Three attempts is the same retry shape used by
          # sync.yml after the Phase 4 retry-loop addition.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin "${GITHUB_REF#refs/heads/}" && git push origin "HEAD:${GITHUB_REF#refs/heads/}"; then
              exit 0
            fi
            echo "keepalive push attempt $attempt failed; retrying."
            sleep $((attempt * 5))
          done
          echo "::error::keepalive push failed after 3 attempts."
          exit 1
